schema_version: 1

context:
  name: fluprodia
  version: "4.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fluprodia-${{ version }}.tar.gz
  sha256: 429f706545610338aa7c982f03ac5795fa91533e9c4c25dae361f5584c4f9e43

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core >=3.2,<4
    - pip
  run:
    - python >=${{ python_min }}
    - coolprop >=6.4
    - numpy >=1.13.3
    - pint

tests:
  - python:
      imports:
        - fluprodia
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Create beautiful fluid property diagrams using CoolProp
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/fwitte/fluprodia

extra:
  recipe-maintainers:
    - jan-janssen
